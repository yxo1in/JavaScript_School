<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function usageFee(age, height) {
        let fee = 0;
        if (age >= 12) {
          fee = 5000;
        } else if (age < 12 && height >= 120) {
          fee = 2000;
        }
        // else if (age < 12 && height < 120) {
        //   fee = 0;
        // }
        if (fee) {
          console.log(`이용료 : ${fee}원`);
          return;
        }
        console.log("이용이 불가능합니다.");
      }
      usageFee(12);
      usageFee(15);
      usageFee(10, 130);
      usageFee(11, 100);
      usageFee(10, 130);
    </script>
  </body>
</html>
