<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <script>
      // String 내장 함수
      // 1. 속성(property) : length
      let str = "Welcome Seoul";
      console.log(str.length); // 13(공백 포함), 인덱스 0 ~ 12

      // 2. indexOf(대상, 시작 위치): 찾고자 하는 문자열의 시작 인덱스 리턴(여러개라면 첫 문자열)
      // indexOf(대상 문자열, 시작 위치)로 작성 가능
      // 찾고자 하는 대상이 없으면 -1 반환
      console.log(str.indexOf("Seoul")); // 8
      str = "Welcome Seoul Seoul";
      console.log(str.indexOf("Seoul", str.indexOf("Seoul") + 1)); // 14
      console.log(str.indexOf("Jeju"));

      // 활용) 전화번호 입력 시 -없이 입력 => 있다면 에러문구
      let tel = "010-0000-0000";
      if (tel.indexOf("-") !== -1) {
        console.log("올바른 값을 입력하시오.");
      } else {
        console.log("통과");
      }

      // 3. lastIndexOf(대상 문자열): 뒤에서부터 문자열을 찾아서 반환(여러개라면 첫 문자열)
      console.log(str.lastIndexOf("Seoul"));

      // 4. ***slice(): 문자열을 (시작위치, 종료위치-1)만큼 잘라내기, 종료위치 입력 x -> 끝까지
      // 시작과 종료 위치에 음수 사용 가능, 음수의 경우 뒤부터
      str = "Welcome Seoul";
      console.log(str.slice(8, 13));
      // seoul 위치를 모를 때
      console.log(str.slice(str.indexOf("Seoul")));
      // 매개변수에 음수
      console.log(str.slice(-5)); // "Seoul"
      console.log(str.slice(-5, -2)); // "Seo", (-5 -4 -3) 인덱스

      // 5. substring() : 문자열을 (시작위치, 종료위치 - 1) 만큼 잘라내기
      // 매개변수에 음수 시 0으로 처리
      str = "Welcome Seoul";
      console.log(str.substring(8, 13));
      console.log(str.substring(-5)); // "Welcome Seoul", (0~끝까지)
      console.log(str.substring(-5, -2)); // "", (0~0)

      // 6. substr() : 문자열을 (시작위치, 잘라낼 길이)만큼 잘라내기
      // 잘라낼 길이를 명확히 아는 경우 매우 효율적 ex) 생년월일, 주민등록번호
      let nowDate = "20260420";
      let year = nowDate.substr(0, 4);
      let month = nowDate.substr(4, 2);
      let date = nowDate.substr(6, 2);
      console.log(year, month, date);

      /*    slice   vs  substring   vs  substr

        - slice: 가장 유연하고 현대적인 메서드, 음수 처리가 가능    -> 실무에서 가장 많이 사용
        - substring: slice와 유사하지만 인덱스가 음수인 경우 처리가 다르다.
        - substr: 인덱스가 아닌 글자 수를 기준으로 하짐나 현재 웹표준으로 권장하지 않는다.
      */
      
      // 7. replace(str1, str2) : str1을 str2로 교체
      str = "Welcome Jeju! Jeju!";
      console.log(str.replace("Jeju", "Seoul"));
      console.log(str.replace("Jeju", "Seoul").replace("Jeju", "Seoul"));
      // 정규식(Reqular expression) 
      // - 특정한 포맷을 맞출 때(전화번호, 년월일, 이메일, 아이디 제한(첫번째는 숫자로 시작 불가, 32글자 이내))
      
      // ** 8. toUpperCase() : 대문자로 변환
      // ** 9. toLowerCase() : 소문자로 변환
      // 사용자는 다양하게 입력하게 되므로...
      // (프론트엔드) : 입력된 내용을 대(소)문자로 변환하면 된다
      console.log(str.toUpperCase());
      console.log(str.toLowerCase());

      // 10. concat(): 여러 문자열을 합치기, 합칠 문자열의 갯수에는 제한이 없다.
      let firstName = "John";
      let lastName = "Doe";
      let fullName = firstName.concat(" ",lastName,". ","Nice to meet you");
      console.log(fullName);

      // 11. trim() : 문자열의 앞, 뒤 공백을 없애기
      // const middleTrim = () => {}   
      let name = "       에이스     2학년       1반         ";
      console.log(name.trim());

      // ***** 12. padStart(문자열 최소 길이, "추가할 문자열") : 현업에서 가장 많이 사용하는 함수 중 하나
      // 특정 문자로 앞을 채운다.

      // 월을 입력받아, 월이 한자리 인 경우 "0"을 붙여서 출력(포맷을 맞추기 위해)
      // month = prompt("월 입력");
      // console.log(month.padStart(2, "0"));

      // 13. padEnd(문자열 최소 길이, "추가할 문자열") : 거의 사용하지 X 

      // 14. charAt(인덱스) : 인덱스에 해당하는 글자 하나를 리턴
      str = "A00001";
      if (str.charAt(0) === 'A') {
        console.log("관리자님 환영합니다.");
      }

      // 15. charCodeAt() : 인덱스에 해당하는 글자의 유니코드를 리턴
      str = '힣'
      console.log(str.charCodeAt(0));
      str = '가';
      console.log(str.charCodeAt(0));

      str = 'A00001';
      console.log(str.charCodeAt(0));

      // ******************* 16. split(파라미터) : 파라미터로 전달받은 문자열을 기준으로 문자열을 쪼갠다
      // 리턴 타입은 배열
      let emails = 'john@gmail.com,jane@gmail.com,hone@hanmail.com'; // 서버로부터 json 형식으로 이메일이 전송되어 온다고 가정 
      let email = emails.split(',');
      console.log(email);

      // ** 17. startsWith() : 파라미터로 시작하는 여부를 boolean (True or False)으로 반환 
      let url = "https://website.com";
      //  https:// 위의 주소가 적절한 웹사이트 주소인지 판별해보시오.
      let correct = 'https://';
      // if(url.trim().slice(0, 8).indexOf(correct) === -1){
      //   console.log("올바르지 않은 주소입니다.");
      // }
      // else{
      //   console.log("올바른 주소입니다.");
      // }
      if(url.trim().startsWith(correct)){
        console.log("적절한 주소입니다.");
      }
      else{
        console.log("적절하지 않은 주소입니다.");
      }

      // 18. endsWith(): 파라미터로 종료하는지 여부를 boolean으로 반환
      </script>
  </body>
</html>
