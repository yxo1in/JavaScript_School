<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .table1 {
        margin-top: 10px;
        border: 1px solid black;
        width: 200px;
        border-collapse: collapse;
      }
      .table1 th {
        border: 1px solid black;
        background-color: rgb(247, 201, 237);
      }
      .table1 td {
        text-align: center;
        border: 1px solid black;
      }
    </style>
  </head>
  <body>
    <select name="drinkType" id="drinkType"></select>
    <br />
    <button onclick="search1()">조회1(문자열)</button>
    <button onclick="search2()">조회2(push, join)</button>
    <table class="table1">
      <thead>
        <th>학번</th>
        <th>이름</th>
      </thead>
      <tbody>
        <tr>
          <td>2101</td>
          <td>강하윤</td>
        </tr>
        <tr>
          <td>2102</td>
          <td>김기범</td>
        </tr>
        <tr>
          <td>2103</td>
          <td>김진수</td>
        </tr>
        <tr>
          <td>2104</td>
          <td>방예린</td>
        </tr>
      </tbody>
    </table>
    <!-- db에서 불러올 데이터를 보여줄 테이블 -->
    <table class="table1">
      <thead>
        <th>음료</th>
        <th>가격</th>
      </thead>
      <tbody id="tbody1"></tbody>
    </table>
    <script>
      //자바스크립트 실무에서 가장 많이 사용하는 객체
      let brands = ["애플", "구글", "메타", "삼성", "아마존", "마이크로소프트"];
      //1. toString() : 쉼표를 기준으로 해서 하나의 문자열로 반환 => 더이상 배열 X
      console.log(brands.toString()); // 애플,구글,메타,삼성...

      //2. join() : 파라미터로 전달된 문자를 이용해서 하나의 문자열로 합치기 => 배열 X
      //innerText vs innerHTML
      console.log(brands.join("")); // 애플구글메타삼성아마존마이크로소프트
      console.log(brands.join("-")); // 애플-구글-메타-삼성-아마존-마이크로소프트

      //2-1. db에서 데이터를 읽어와 동적으로 표를 이용해서 출력
      // 장점 : 가독성, 단점 : 성능
      const search1 = () => {
        //1. 데이터 읽기
        const drinkList = [
          { name: "오렌지", price: 1000 },
          { name: "파워에이드", price: 1200 },
          { name: "커피", price: 700 },
          { name: "보리음료", price: 1200 },
          { name: "코카콜라", price: 1800 },
        ];
        //2. 데이터 수에 맞게 태그 생성
        let tagStr = "";
        for (drink of drinkList) {
          tagStr +=
            "<tr><td>" + drink.name + "</td><td>" + drink.price + "</td></tr>";
        }
        // console.log(tagStr);
        //3. 태그 랜더링(inner html)해서 화면에 뿌리기
        document.getElementById("tbody1").innerHTML = tagStr;
      };
      // 2-2. join()실무 활용 예제 => db에서 데이터를 읽어와 동적으로 표를 이용해서 출력
      // push(), join()
      // 장점 : 성능, 단점 :
      const search2 = () => {
        const drinkList = [
          { name: "오렌지", price: 1000 },
          { name: "파워에이드", price: 1200 },
          { name: "커피", price: 700 },
          { name: "보리음료", price: 1200 },
          { name: "코카콜라", price: 1800 },
        ];
        let arr = [];
        for (drink of drinkList) {
          arr.push(`<tr><td>${drink.name}</td><td>${drink.price}</td></tr>`);
        }
        document.getElementById("tbody1").innerHTML = arr.join("");
      };

      // 3. pop() : 배열의 마지막 요소 삭제, 마지막 값 리턴
      brands = ["애플", "구글", "메타", "삼성", "아마존", "마이크로소프트"];
      console.log(brands.pop());
      console.log(brands);

      // 4. push() : 배열의 마지막에 요소를 추가, 길이를 리턴
      console.log(brands.push("테슬라")); // 6
      console.log(brands);

      // 5. unshift() : 배열의 처음에 요소를 추가
      // 단점 : 실무 활용도 낮음
      console.log(brands.unshift("하이닉스")); // 7
      console.log(brands);

      //5-1. unshift() 실무 활용
      function loadDrinkList() {
        const types = [
          { text: "이온음료", code: "A" },
          { text: "커피", code: "B" },
          { text: "콜라", code: "C" },
        ];
        types.unshift({text: "주스", code: "D"});
        const tag = [];
        for (type of types) {
          tag.push(`<option value="${type.code}">${type.text}</option>`);
        }
        return tag;
      }
      const tagList = loadDrinkList();
      console.log(tagList);
      document.getElementById("drinkType").innerHTML = tagList.join("");
    </script>
  </body>
</html>
