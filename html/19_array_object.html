<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .table1 {
        margin-top: 10px;
        border: 1px solid black;
        width: 200px;
        border-collapse: collapse;
      }
      .table1 th {
        border: 1px solid black;
        background-color: rgb(250, 211, 242);
      }
      td {
        text-align: center;
        border: 1px solid black;
      }
      
      .table2 {
        border: 1px solid black;
        margin-top:10px;
        border-collapse: collapse;
        width: 500px;
      }

      .table2 th{
        border : 1px solid black;
        background-color: rgb(255, 255, 213);
      }

    </style>
  </head>
  <body>
    <select name="drinkType" id="drinkType"></select>
    <br />
    <select name="drinkType2" id="drinkType2"></select>
    <br />
    <button onclick="search1()">조회1(문자열)</button>
    <button onclick="search2()">조회2(push, join)</button>
    <table class="table1">
      <thead>
        <th>학번</th>
        <th>이름</th>
      </thead>
      <tbody>
        <tr>
          <td>2101</td>
          <td>강하윤</td>
        </tr>
        <tr>
          <td>2102</td>
          <td>김기범</td>
        </tr>
        <tr>
          <td>2103</td>
          <td>김진수</td>
        </tr>
        <tr>
          <td>2104</td>
          <td>방예린</td>
        </tr>
      </tbody>
    </table>
    <!-- db에서 불러올 데이터를 보여줄 테이블 -->
    <table class="table1">
      <thead>
        <th>음료</th>
        <th>가격</th>
      </thead>
      <tbody id="tbody1"></tbody>
    </table>
    <table class="table2">
      <thead></thead>
        <th>아이디</th>
        <th>제품명</th>
        <th>가격</th>
        <th>카테고리</th>
      </thead>
      <tbody id="product-body">

      </tbody>
    </table>
    <script>
      //자바스크립트 실무에서 가장 많이 사용하는 객체
      let brands = ["애플", "구글", "메타", "삼성", "아마존", "마이크로소프트"];
      //1. toString() : 쉼표를 기준으로 해서 하나의 문자열로 반환 => 더이상 배열 X
      console.log(brands.toString()); // 애플,구글,메타,삼성...

      //2. join() : 파라미터로 전달된 문자를 이용해서 하나의 문자열로 합치기 => 배열 X
      //innerText vs innerHTML
      console.log(brands.join("")); // 애플구글메타삼성아마존마이크로소프트
      console.log(brands.join("-")); // 애플-구글-메타-삼성-아마존-마이크로소프트

      //2-1. db에서 데이터를 읽어와 동적으로 표를 이용해서 출력
      // 장점 : 가독성, 단점 : 성능
      const search1 = () => {
        //1. 데이터 읽기
        const drinkList = [
          { name: "오렌지", price: 1000 },
          { name: "파워에이드", price: 1200 },
          { name: "커피", price: 700 },
          { name: "보리음료", price: 1200 },
          { name: "코카콜라", price: 1800 },
        ];
        //2. 데이터 수에 맞게 태그 생성
        let tagStr = "";
        for (drink of drinkList) {
          tagStr +=
            "<tr><td>" + drink.name + "</td><td>" + drink.price + "</td></tr>";
        }
        // console.log(tagStr);
        //3. 태그 랜더링(inner html)해서 화면에 뿌리기
        document.getElementById("tbody1").innerHTML = tagStr;
      };
      // 2-2. join()실무 활용 예제 => db에서 데이터를 읽어와 동적으로 표를 이용해서 출력
      // push(), join()
      // 장점 : 성능, 단점 :
      const search2 = () => {
        const drinkList = [
          { name: "오렌지", price: 1000 },
          { name: "파워에이드", price: 1200 },
          { name: "커피", price: 700 },
          { name: "보리음료", price: 1200 },
          { name: "코카콜라", price: 1800 },
        ];
        let arr = [];
        for (drink of drinkList) {
          arr.push(`<tr><td>${drink.name}</td><td>${drink.price}</td></tr>`);
        }
        document.getElementById("tbody1").innerHTML = arr.join("");
      };

      // 3. pop() : 배열의 마지막 요소 삭제, 마지막 값 리턴
      brands = ["애플", "구글", "메타", "삼성", "아마존", "마이크로소프트"];
      console.log(brands.pop());
      console.log(brands);

      // 4. push() : 배열의 마지막에 요소를 추가, 길이를 리턴
      console.log(brands.push("테슬라")); // 6
      console.log(brands);

      // 5. unshift() : 배열의 처음에 요소를 추가
      // 단점 : 실무 활용도 낮음
      console.log(brands.unshift("하이닉스")); // 7
      console.log(brands);

      //5-1. unshift() 실무 활용
      function loadDrinkList() {
        const types = [
          { text: "이온음료", code: "A" },
          { text: "커피", code: "B" },
          { text: "콜라", code: "C" },
        ];
        // types.unshift({text: "주스", code: "D"});
        // types.unshift({text: "전체", code: "All"});
        const tag = [];
        for (type of types) {
          tag.push(`<option value="${type.code}">${type.text}</option>`);
        }
        return tag;
      }
      const tagList = loadDrinkList();
      console.log(tagList);
      document.getElementById("drinkType").innerHTML = tagList.join("");

      const loadDrinkList2 = (text, code) => {
        const types = [
          { text: "이온음료", code: "A" },
          { text: "커피", code: "B" },
          { text: "콜라", code: "C" },
        ];
        if (text) {
          types.unshift({ text: text, code: code });
        }
        const tag = [];
        for (type of types) {
          tag.push(`<option value="${type.code}">${type.text}</option>`);
        }
        return tag;
      };
      const tagList2 = loadDrinkList2("전체", "All");
      document.getElementById("drinkType2").innerHTML = tagList2.join("");

      // 6. shift() : 배열의 맨 앞 요소를 제거, 제거한 요소 리턴
      brands = ["애플", "구글", "메타", "삼성", "아마존", "마이크로소프트"];
      console.log(brands.shift()); // 애플
      console.log(brands); // ['구글', '메타', '삼성', '아마존', '마이크로소프트']

      // 7. concat() : 배열을 n개 이어 붙임
      let arr1 = ["강하윤", "김기범"];
      let arr2 = ["김진수", "방예린"];
      let arr3 = ["오세영", "윤기진"];
      let arr4 = arr1.concat(arr2);
      let arr5 = arr1.concat(arr2, arr3);
      console.log(arr4);
      console.log(arr5);

      // 전개 연산자(spread operator)
      let arr6 = [...arr1, ...arr2, ...arr3];
      console.log(arr6);

      // 8. splice(n1. n2. n3) : 특정한 위치에 요소를 추가하거나 삭제 기능
      // n1 : 추가할 요소의 위치, n2 : 삭제할 개수, n3: 추가할 요소
      brands = ["애플", "구글", "메타", "삼성", "아마존", "마이크로소프트"];
      // 구글 앞에 하이닉스 십입
      brands.splice(1, 0, "하이닉스");
      brands.splice(4, 2);
      console.log(brands);
      // brands = ["애플", "구글", "메타", "삼성", "아마존", "마이크로소프트"];
      // 로직으로 구현 : "구글" 앞에 "테슬라" 삽입
      brands.splice(brands.indexOf("구글"), 0, "테슬라");
      console.log(brands);

      // 9. slice(start, end) : start 부터 end - 1까지 배열을 잘라냄 => 배열 리턴
      // ['애플', '하이닉스', '테슬라', '구글', '메타', '마이크로소프트']
      console.log(brands.slice(0, 5));

      // 10. ***************sort()***************
      // : 정렬(기준 : 문자열)
      // 기본 : 문자열 오름차순
      // 숫자 정렬??????????
      /*
        자바스크립트의 비교 함수의 동작 원리 ->
        엔진이 내부적으로 알고리즘(크롬의 경우 TimSort 알고리즘)를 갖고 있으며
        함수를 매개변수로 사용하며, 함수는 파라미터로 a, b를 갖는다.
        반환값에 따라 다음과 같이 동작한다.

        if (a > b) return 1; // 양수이면 자리를 바꾼다.
        else if(a < b) return -1 // 음수이면 자리를 바꾸지 않는다.
        else 0; // 순서를 바꾸지 않는다
        => if, else if, else를 한 줄로 바꾸면....
      */

      /*
        형식
        const 결과배열 = 대상배열.sort(a, b) => {
          return a-b;(오름차순)
          return b-a;(내림차순)
        }
      */
      console.log(brands.sort());

      let point = [100, 98, 95, 87, 79, 67];
      console.log(point.sort()); // [100, 67, 79, 87, 95, 98] => 문자열로 취급
      const ascPoints = point.sort((a, b) => {
        return a - b;
      });

      console.log(ascPoints); // [67, 79, 87, 95, 98, 100](오른차순)

      const descPoints = point.sort((a, b) => {
        return b - a;
      });
      console.log(descPoints); // [100, 98, 95, 87, 79, 67](내림차순)

      // 10-1. sort()의 활용 => 가격을 기준으로 오름차순 정렬
      const drinkList = [
        { name: "오렌지", price: 1000 },
        { name: "파워에이드", price: 1200 },
        { name: "커피", price: 700 },
        { name: "보리음료", price: 1200 },
        { name: "코카콜라", price: 1800 },
      ];
      // const inputKey = prompt();
      // const ascDrinkList = drinkList.sort((a, b) => a[inputKey] - b[inputKey]);
      // console.log(ascDrinkList);

      /* 11. **************** filter() ****************
        배열에서 특정 조건에 맞는 요소만 배열로 반환, 원래 배열은 변하지 않는다.
      */
      // drinkList에서 1000원으로 구입 가능한 음료
      let available = [];
      for (let p of drinkList) {
        if (p.price <= 1000) {
          available.push(p.name);
        }
      }
      console.log(available.join(", "));

      available = drinkList.filter((drink) => {
        return drink.price <= 1000;
      });
      console.log(available);

      //  과제1 : 필터 조건 : 악세서리 중 10만원 이하인 것을 찾아라.
      //  과제2 : 필터 조건 : 카테고리 중 악세서리인 것을 찾아라.
      //  과제3 : 필터 조건 : 카테고리 중 악세서리이며 가격이 10만원 이하인 것을 찾아라.
      let products = [
        { id: 1, name: "맥북 프로", category: "electronics", price: 2500000 },
        {id: 2,name: "아이패드 에어",category: "electronics",price: 900000,},
        {id: 3,name: "기계식 키보드",category: "accessories",price: 150000,},
        { id: 4, name: "허브 매트", category: "accessories", price: 30000 },
      ];

      let homework1 = products.filter((p) => p.price <= 100000);
      let homework2 = products.filter((p) => p.category === "accessories");
      let homework3 = products.filter(
        (p) => p.price <= 100000 && p.category === "accessories",
      );
      console.log(homework1);
      console.log(homework2);
      console.log(homework3);

      /* 12. map() 
          : 배열의 모든 요소를 하나씩 돌면서 실행하고, 새로운 배열을 생성하는 함수
          기존 배열을 변화하지 않는다.(새로운 배열 생성)
      */
      let userList = [
        { firstName: "현민", lastName: "이", email: "lee@gmail.com" },
        { firstName: "지수", lastName: "임", email: "lim@gmail.com" },
        { firstName: "하은", lastName: "장", email: "jang@gmail.com" },
      ];
      // console.log(userList);
      // 12-1. map()을 활용해서 fullName, email을 갖는 newUserList 생성
      const newUserList = userList.map((u) => {
        return {fullName : u.lastName.concat(u.firstName), email : u.email};
      })
      console.log(newUserList)
      // 12-2. map()을 활용해서 products배열을 화면에 표로 나타내기
      // const cutNumber = (price) => {
      //   priceArr = price.toString().split("");
      //   let cnt = 0;
      //   for(let i = priceArr.length-1; i > 0; i--){
      //     cnt++;
      //     if(cnt % 3 === 0 && i != 0){
      //       priceArr.splice(i, 0, ",");
      //     }
      //   }
      //   return priceArr.join("");
      // }
      products = [
        { id: 1, name: "맥북 프로", category: "electronics", price: 2500000 },
        { id: 2, name: "아이패드 에어", category: "electronics", price: 900000 },
        { id: 3, name: "기계식 키보드", category: "accessories", price: 150000 },
        { id: 4, name: "허브 매트", category: "accessories", price: 30000 },
      ];
      let productTable = products.map((p) => {
        const formatPrice = p.price.toLocaleString();
        return `<tr><td>${p.id}</td><td>${p.name}</td><td>${formatPrice}</td><td>${p.category}</td></tr>`
      })
      document.getElementById('product-body').innerHTML = productTable.join("");
      
      // 13. reduce(p1, p2, p3, p4) : 배열요소의 누적 합을 구하는 함수, 또는 특정한 조건에 해당하는 값만 추출하는 함수
      /*
      p1 : 누적 값
      p2 : 현재 값
      p3 : 현재 배열 인덱스(생략 가능)
      p4 : 전체 배열(생략 가능)
      배열.reduce((p1, p2) => {
        return 다음 p1에 넘겨줄 값
      }, 초기값)
      */
     products = [
       { id: 1, name: "맥북 프로", category: "electronics", price: 2500000 },
       { id: 2, name: "아이패드 에어", category: "electronics", price: 900000 },
       { id: 3, name: "기계식 키보드", category: "accessories", price: 150000 },
       { id: 4, name: "허브 매트", category: "accessories", price: 30000 },
     ];
     let totalPrice = 0;
     for(p of products){
      totalPrice += p.price;
     }
     console.log(totalPrice);
     let sum = products.reduce((sum, p) => {
      return sum += p.price;
     }, 0)
     console.log(sum);

     point = [100, 98, 95, 87, 79, 68];
     let sumOfPoint = point.reduce((sum, point) => {
      return sum += point;
     }, 0)
     console.log(sumOfPoint);

     const drinkList2 = [
        { name: "오렌지", price: 1000 },
        { name: "파워에이드", price: 1200 },
        { name: "커피", price: 700 },
        { name: "보리음료", price: 1200 },
        { name: "코카콜라", price: 1800 },
      ];
      let sumOfDrink = drinkList2.reduce((sum, drink) => {
        return sum += drink.price;
      }, 0)
      console.log(sumOfDrink);
    </script>
  </body>
</html>
