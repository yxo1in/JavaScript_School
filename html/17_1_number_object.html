<!doctype html> 
<html lang="en"> 
  <head> 
    <meta charset="UTF-8" /> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
    <title>Document</title> 
  </head> 
  <body> 
    <script> 
      // 1. slice 실무 활용 예제 
      //  1-1. 긴 텍스트를 "더보기" 처리 코드 
      const longString = 
        "자바스크립트 실무 마스터: 기초에서 심화까지 한 번에 끝내기"; 
 
      const truncateTitle = (title, maxLength) => { 
        if (title.length > maxLength) { 
          return title.slice(0, maxLength) + "....."; 
        } else { 
          return title; 
        } 
      }; 
      console.log(truncateTitle(longString, 10)); 
      //  1-2. 전화 번호 뒷자리 ****로 마스킹 처리 
      let phoneNumber = "010-1234-5678"; 
 
      const hiddenNumber = phoneNumber.slice(0, -4) + "****"; 
      console.log(hiddenNumber); 
 
      // 2. replace 실무 활용 예제(정규식) 
      //  2-1. 전화번호를 입력받아 db에 저장 
      phoneNumber = "010-1234-5678"; 
      // const clearNumber = (phoneNumber) => { 
      //     while(phoneNumber.indexOf('-') != -1){ 
      //         phoneNumber = phoneNumber.replace('-', ''); 
      //     } 
      //     return phoneNumber; 
      // } 
      /*  정규식 
            - / / 사이에 작성 
            - \는 아니다. 
            - D는 숫자 의미 : \D = 숫자가 x(대문자여야 함) 
            - g는 전체 
      */ 
      const clearNumber = phoneNumber.replace(/\D/g, ""); 
      console.log(clearNumber); 
      let str = "Welcome Jeju! Jeju!"; 
      console.log(str.replace(/Jeju/g, "Seoul"));   // Jeju 전체(g)를 Seoul로 바꿈
 
      // 3. padStart 실무 활용 예제 
      //  3-1. 쇼핑 사이트에서 주문 번호나 회원번호를 생성하고 관리하기 편하도록 
      let memberNumber = 234; 
      const generateMemberNumber = (number, digit) => "MN-"+ String(number).padStart(digit, "0"); 
      console.log(generateMemberNumber(memberNumber, 6)); 
 
      // 4. charAt 실무 활용 예제 
      const checkGender = (sn) => {
        let n = +sn.charAt(7);
        let gender = "";
        if(n % 2 == 0){
          gender = "여성";
        }
        else{
          gender = "남성";
        }
        if(gender === ""){
          return "잘못된 값";
        }
        return n <= 4 ? "내국인 ".concat(gender) : "외국인 ".concat(gender);
      }
      console.log(checkGender("091215-4057213")); // 내국인 여성

      // 5. split 실무 활용 예제
      // url을 통해 특정 파라미터를 추출하기(카테고리, 물품명)
      const url = "https://myshop.com/aaaa/products/electronics/iphone15";
      const pageSegment = url.split("/");
      let size = pageSegment.length;

      // 카테고리
      console.log(`카테고리 : ${pageSegment[size-2]}`);

      //물품
      console.log(`제품명 : ${pageSegment[size-1]}`);

      // ******** log 파일을 통해 시간과 사용자 알아내기
      const csvData = "2026-04-29,Login_Success,user01\n2024-04-29,Login_Fail,user_02";
      let log = csvData.split("\n");
      for(let l of log){
        [date, status, user] = l.split(",");  // 배열 분할 할당
        
        if(status.endsWith("Success")){
          console.log(`${user}이/가 ${date}에 로그인을 성공했습니다.`);
        }
      }

      // 6. endsWith 실무 활용 예제
      // jpg, png 만 업로드 가능하다고 가정하자.
      const checkFileName = (fileName) => {
        if(fileName.toLowerCase().endsWith('jpg') || fileName.toLowerCase().endsWith('png')){
          return "업로드 가능합니다."
        }
        else{
          return "업로드 불가능합니다."
        }
      };
      console.log(checkFileName("my_photo.JPG")); // 업로드 가능합니다.
      console.log(checkFileName("my_photo.gif")); // 업로드 불가능합니다.

    </script> 
  </body> 
</html>
