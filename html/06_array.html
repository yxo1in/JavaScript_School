
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      /* 배열
            - 하나 이상의 데이터를 담을 수 있다.
            - 순서가 있다.
            - []를 이용해서 할당
            - 어떤 데이터 타입도 올 수 있다.
            - 어떤 데이터 타입도 함께 쓸 수 있다.
        */
      let nums = [1, 3, 12, 4, 67, -89, 12.345];
      let str = ["a", "b", "c"];
      let mix = [1, "0", 3, true, { name: "김기범" }, [1, 2, 3, 4]];

      console.log(nums);
      console.log(str);
      console.log(mix);

      // 1. 속성 : property, length
      console.log(nums.length);
      console.log(str.length);
      console.log(mix.length);

      // 2. 인덱스 : [], 0부터, 배열의 순서는 항상 지켜진다.
      console.log(mix[4]);

      // 3. 요소 수정
      nums[5] = 89;
      console.log(nums);

      // 4. 다양한 내장 함수(method) 지원  ex) push(), pop()
      console.log(mix.pop()); // -> 배열의 마지막 인덱스에 있는 값을 꺼내옴
      nums.push(0); // -> 배열에 맨 뒤에 매게변수 값을 추가
      console.log(nums);

      // 5. 배열과 객체의 활용
      // ex) 개발한 시스템에서 사용자 목록을 읽어온다고 가정할 때
      let userList = [
        {
          name: "정국",
          gender: "남자",
          email: "jung@gmali.com",
          phone: "000-1111-1111",
        },
        {
            name: "뷔",
            gender: "남자",
            email: "vui@gmail.com",
            phone: "010-2222-1111"
        },
        {
            name: "로제",
            gender: "여자",
            email: "rose@gmail.com",
            phone: "010-3333-1111"
        }
      ];
      let user1 = userList[0];
      let user2 = userList[1];
      let user3 = userList[2];
      console.log(user3.email);
    </script>
  </body>
</html>
