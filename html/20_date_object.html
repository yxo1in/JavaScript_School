<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input type="date" name="" id="startDate" />
    <input type="date" name="" id="endDate" />

    <script>
      //1. 객체 생성하기
      const now = new Date();
      console.log(now); // Mon Jun 15 2026 11:26:46 GMT+0900 (한국 표준시)

      //2. 년, 월, 일, 시간, 분, 초, 밀리초로 만들기
      const d = new Date(2026, 4, 5, 13, 10, 0); // 월은 0부터 11까지
      console.log(d); // Tue May 05 2026 13:10:00 GMT+0900 (한국 표준시)

      // 3. get() 내장함수
      let year = now.getFullYear();
      let month = now.getMonth();
      let day = now.getDay(); // 요일
      let date = now.getDate(); // 일 0~7 => 일요일(0)~토요일(6)
      let hour = now.getHours();
      let minute = now.getMinutes();
      let second = now.getSeconds();
      let milliseconds = now.getMilliseconds();
      console.log(year, month, day, date, hour, minute, second, milliseconds);

      // 4. set() 내장함수 => 알아서 찾거라(많이 안씀)
      // 5. 오늘 날짜 구하기 => endDate에 뿌리기
      // YYYY-MM-DD
      document.getElementById("endDate").value =
        `${year}-${(month + 1).toString().padStart(2, "0")}-${date.toString().padStart(2, "0")}`;

      // 6. 일주일 전을 startDate에 넣기
      //   const start = new Date(year, month, date-2000);
      //   console.log(start);
      // 6-1. 기준시 지원 : 1970-01-01 09:00:00
      let d2 = new Date(0);
      console.log(d2);

      let d3 = new Date(24*60*60*1000);
      console.log(d3);

      let current = now.getTime();
      console.log(current);
    </script>
  </body>
</html>
