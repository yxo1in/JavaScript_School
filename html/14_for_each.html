<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //forEach :
        // - 배열에서 많이 사용
        // - forEach(함수): 함수가 매개변수로 오는 메소드
        let brands = [
        "애플",
        "구글",
        "마이크로소프트",
        "삼성",
        "아마존",
        "테슬라",
      ];
      brands.forEach(function (brand, index) {      // 선언함수
        console.log(index,':',brand);
      });

      //활용: 총점 계산
      const myScores = [100, 98, 87, 90, 96];
      let total = 0;
      myScores.forEach((score) => {
        total += score;
      });
      console.log("합계:",total);
      console.log("평균:",(total/myScores.length));


    </script>
</body>
</html>
